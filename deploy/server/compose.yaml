services:
  legato-server:
    build:
      context: ../..
      dockerfile: deploy/server/Dockerfile
    image: legato-server:local
    container_name: legato-server
    restart: unless-stopped
    environment:
      LEGATO_SERVER__COMMON__TRACING__JSON: "true"
      LEGATO_SERVER__COMMON__TRACING__LEVEL: "${LEGATO_LOG_LEVEL:-info}"
    ports:
      - "${LEGATO_SERVER_PORT:-7823}:7823"
    volumes:
      - "${LEGATO_LIBRARY_ROOT:-/mnt/pool/libraries}:/srv/libraries:ro"
      - "${LEGATO_STATE_DIR:-/mnt/pool/appdata/legato}:/var/lib/legato"
      - "${LEGATO_CONFIG_DIR:-/mnt/pool/appdata/legato/config}:/etc/legato:ro"
