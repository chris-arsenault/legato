name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  ci:
    uses: chris-arsenault/ahara/.github/workflows/ci.yml@main
    secrets: inherit

  package-macos-client:
    name: Package macOS Client
    needs: [ci]
    runs-on: macos-latest
    if: ${{ needs.ci.result == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build legatofs
        run: cargo build --release -p legatofs
      - name: Package macOS installer
        run: bash ./deploy/client/package-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: legatofs-macos-installer
          path: artifacts/macos/*.pkg

  package-windows-client:
    name: Package Windows Client
    needs: [ci]
    runs-on: windows-latest
    if: ${{ needs.ci.result == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install WinFsp
        shell: pwsh
        run: |
          $msiPath = Join-Path $env:RUNNER_TEMP "winfsp-2.1.25156.msi"
          Invoke-WebRequest `
            -Uri "https://github.com/winfsp/winfsp/releases/download/v2.1/winfsp-2.1.25156.msi" `
            -OutFile $msiPath

          $install = Start-Process `
            -FilePath "msiexec.exe" `
            -ArgumentList "/i `"$msiPath`" /qn /norestart ADDLOCAL=ALL" `
            -Wait `
            -PassThru
          if (($install.ExitCode -ne 0) -and ($install.ExitCode -ne 3010)) {
            throw "WinFsp MSI install failed with exit code $($install.ExitCode)."
          }

          $installDirCandidates = @(
            "${env:ProgramFiles(x86)}\WinFsp",
            "$env:ProgramFiles\WinFsp"
          )
          $installDir = $installDirCandidates | Where-Object { Test-Path (Join-Path $_ "inc\winfsp\winfsp.h") } | Select-Object -First 1
          if (-not $installDir) {
            throw "WinFsp headers were not found after installation."
          }

          $registryPath = "HKLM:\SOFTWARE\WOW6432Node\WinFsp"
          New-Item -Path $registryPath -Force | Out-Null
          New-ItemProperty -Path $registryPath -Name InstallDir -Value $installDir -PropertyType String -Force | Out-Null
      - name: Build legatofs
        run: cargo build --release -p legatofs
      - name: Package Windows installer
        shell: pwsh
        run: .\deploy\client\package-windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: legatofs-windows-installer
          path: artifacts/windows/*.exe
