name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  ci:
    uses: chris-arsenault/ahara/.github/workflows/ci.yml@main
    secrets: inherit

  package-macos-client:
    name: Package macOS Client
    needs: [ci]
    runs-on: macos-latest
    if: ${{ needs.ci.result == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build legatofs
        run: cargo build --release -p legatofs
      - name: Package macOS installer
        run: ./deploy/client/package-macos.sh
      - name: Validate macOS installer
        run: ./deploy/client/validate-macos-package.sh "$(ls artifacts/macos/*.pkg | head -n1)"
      - uses: actions/upload-artifact@v4
        with:
          name: legatofs-macos-installer
          path: artifacts/macos/*.pkg

  package-windows-client:
    name: Package Windows Client
    needs: [ci]
    runs-on: windows-latest
    if: ${{ needs.ci.result == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build legatofs
        run: cargo build --release -p legatofs
      - name: Package Windows installer
        shell: pwsh
        run: .\deploy\client\package-windows.ps1
      - name: Validate Windows installer
        shell: pwsh
        run: .\deploy\client\validate-windows-installer.ps1 (Get-ChildItem artifacts\windows\*.exe | Select-Object -First 1).FullName
      - uses: actions/upload-artifact@v4
        with:
          name: legatofs-windows-installer
          path: artifacts/windows/*.exe

  release-validation:
    name: Release Validation
    needs: [ci]
    runs-on: ubuntu-latest
    if: ${{ needs.ci.result == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binaries
        run: cargo build --release -p legato-server -p legatofs
      - name: Run local release smoke
        run: ./deploy/release/validate-local.sh
