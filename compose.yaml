services:
  legato-server:
    image: ghcr.io/chris-arsenault/legato:${IMAGE_TAG}
    container_name: legato-server
    restart: unless-stopped
    user: "${LEGATO_UID:-42173}:${LEGATO_GID:-42173}"
    environment:
      LEGATO_SERVER__COMMON__TRACING__JSON: "true"
      LEGATO_SERVER__COMMON__TRACING__LEVEL: "info"
    ports:
      - "7823:7823"
    volumes:
      - /mnt/apps/shares/legato:/srv/libraries:ro
      - /mnt/apps/apps/legato:/var/lib/legato
      - /mnt/apps/apps/legato/config:/etc/legato
