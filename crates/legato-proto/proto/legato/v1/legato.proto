syntax = "proto3";

package legato.v1;

service Legato {
  rpc Attach(AttachRequest) returns (AttachResponse);
  rpc Resolve(ResolveRequest) returns (ResolveResponse);
  rpc Fetch(FetchRequest) returns (stream ExtentRecord);
  rpc Hint(HintRequest) returns (HintResponse);
  rpc SubscribeChanges(SubscribeChangesRequest) returns (stream ChangeRecord);
  rpc Stat(StatRequest) returns (StatResponse);
  rpc ListDir(ListDirRequest) returns (ListDirResponse);
  rpc ResolvePath(ResolvePathRequest) returns (ResolvePathResponse);
  rpc Subscribe(SubscribeRequest) returns (stream InvalidationEvent);
}

enum Capability {
  CAPABILITY_UNSPECIFIED = 0;
  CAPABILITY_METADATA = 1;
  reserved 2;
  CAPABILITY_PREFETCH = 3;
  CAPABILITY_INVALIDATIONS = 4;
  CAPABILITY_RESOLVE = 5;
  CAPABILITY_EXTENT_FETCH = 6;
  CAPABILITY_CHANGE_SUBSCRIPTION = 7;
  CAPABILITY_HINT = 8;
}

enum PrefetchPriority {
  PREFETCH_PRIORITY_UNSPECIFIED = 0;
  PREFETCH_PRIORITY_P0 = 1;
  PREFETCH_PRIORITY_P1 = 2;
  PREFETCH_PRIORITY_P2 = 3;
  PREFETCH_PRIORITY_P3 = 4;
}

enum InvalidationKind {
  INVALIDATION_KIND_UNSPECIFIED = 0;
  INVALIDATION_KIND_FILE = 1;
  INVALIDATION_KIND_DIRECTORY = 2;
  INVALIDATION_KIND_SUBTREE = 3;
}

enum TransferClass {
  TRANSFER_CLASS_UNSPECIFIED = 0;
  TRANSFER_CLASS_UNITARY = 1;
  TRANSFER_CLASS_STREAMED = 2;
  TRANSFER_CLASS_RANDOM = 3;
}

enum ChangeKind {
  CHANGE_KIND_UNSPECIFIED = 0;
  CHANGE_KIND_UPSERT = 1;
  CHANGE_KIND_DELETE = 2;
  CHANGE_KIND_INVALIDATE = 3;
  CHANGE_KIND_CHECKPOINT = 4;
}

message AttachRequest {
  uint32 protocol_version = 1;
  string client_name = 2;
  repeated Capability desired_capabilities = 3;
}

message AttachResponse {
  uint32 protocol_version = 1;
  repeated Capability negotiated_capabilities = 2;
  string server_name = 3;
}

message FileMetadata {
  uint64 file_id = 1;
  string path = 2;
  uint64 size = 3;
  uint64 mtime_ns = 4;
  bytes content_hash = 5;
  bool is_dir = 6;
  reserved 7;
}

message ExtentDescriptor {
  uint32 extent_index = 1;
  uint64 file_offset = 2;
  uint64 length = 3;
  bytes extent_hash = 4;
}

message FileLayout {
  TransferClass transfer_class = 1;
  repeated ExtentDescriptor extents = 2;
}

message InodeMetadata {
  uint64 file_id = 1;
  string path = 2;
  uint64 size = 3;
  uint64 mtime_ns = 4;
  bool is_dir = 5;
  FileLayout layout = 6;
  uint64 inode_generation = 7;
  bytes content_hash = 8;
}

message ResolveRequest {
  string path = 1;
}

message ResolveResponse {
  InodeMetadata inode = 1;
}

message ExtentRef {
  uint64 file_id = 1;
  uint32 extent_index = 2;
  uint64 file_offset = 3;
  uint64 length = 4;
  uint64 inode_generation = 5;
  bytes extent_hash = 6;
}

message FetchRequest {
  repeated ExtentRef extents = 1;
}

message ExtentRecord {
  uint64 file_id = 1;
  uint32 extent_index = 2;
  uint64 file_offset = 3;
  bytes data = 4;
  bytes extent_hash = 5;
  TransferClass transfer_class = 6;
}

message HintExtent {
  uint64 file_id = 1;
  uint32 extent_index = 2;
  uint64 file_offset = 3;
  uint64 length = 4;
  PrefetchPriority priority = 5;
  uint64 deadline_unix_ms = 6;
}

message HintRequest {
  repeated HintExtent extents = 1;
  bool wait_for_residency = 2;
  PrefetchPriority wait_through_priority = 3;
}

message HintResponse {
  repeated HintExtent accepted = 1;
  repeated HintExtent completed = 2;
}

message SubscribeChangesRequest {
  uint64 since_sequence = 1;
}

message ChangeRecord {
  uint64 sequence = 1;
  ChangeKind kind = 2;
  uint64 file_id = 3;
  string path = 4;
  InodeMetadata inode = 5;
  repeated DirectoryEntry entries = 6;
}

message StatRequest {
  string path = 1;
}

message StatResponse {
  FileMetadata metadata = 1;
}

message DirectoryEntry {
  string name = 1;
  string path = 2;
  bool is_dir = 3;
  uint64 file_id = 4;
}

message ListDirRequest {
  string path = 1;
}

message ListDirResponse {
  repeated DirectoryEntry entries = 1;
}

message ResolvePathRequest {
  string path = 1;
}

message ResolvePathResponse {
  FileMetadata metadata = 1;
}

message SubscribeRequest {}

message InvalidationEvent {
  InvalidationKind kind = 1;
  string path = 2;
  uint64 file_id = 3;
  uint64 issued_at_ns = 4;
}
