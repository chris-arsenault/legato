syntax = "proto3";

package legato.v1;

service Legato {
  rpc Attach(AttachRequest) returns (AttachResponse);
  rpc Stat(StatRequest) returns (StatResponse);
  rpc ListDir(ListDirRequest) returns (ListDirResponse);
  rpc ResolvePath(ResolvePathRequest) returns (ResolvePathResponse);
  rpc Open(OpenRequest) returns (OpenResponse);
  rpc ReadBlocks(ReadBlocksRequest) returns (stream BlockResponse);
  rpc Prefetch(PrefetchRequest) returns (PrefetchResponse);
  rpc Subscribe(SubscribeRequest) returns (stream InvalidationEvent);
  rpc Close(CloseRequest) returns (CloseResponse);
}

enum Capability {
  CAPABILITY_UNSPECIFIED = 0;
  CAPABILITY_METADATA = 1;
  CAPABILITY_BLOCK_STREAMING = 2;
  CAPABILITY_PREFETCH = 3;
  CAPABILITY_INVALIDATIONS = 4;
}

enum PrefetchPriority {
  PREFETCH_PRIORITY_UNSPECIFIED = 0;
  PREFETCH_PRIORITY_P0 = 1;
  PREFETCH_PRIORITY_P1 = 2;
  PREFETCH_PRIORITY_P2 = 3;
  PREFETCH_PRIORITY_P3 = 4;
}

enum InvalidationKind {
  INVALIDATION_KIND_UNSPECIFIED = 0;
  INVALIDATION_KIND_FILE = 1;
  INVALIDATION_KIND_DIRECTORY = 2;
  INVALIDATION_KIND_SUBTREE = 3;
}

message AttachRequest {
  uint32 protocol_version = 1;
  string client_name = 2;
  repeated Capability desired_capabilities = 3;
}

message AttachResponse {
  uint32 protocol_version = 1;
  repeated Capability negotiated_capabilities = 2;
  string server_name = 3;
}

message FileMetadata {
  uint64 file_id = 1;
  string path = 2;
  uint64 size = 3;
  uint64 mtime_ns = 4;
  bytes content_hash = 5;
  bool is_dir = 6;
  uint32 block_size = 7;
}

message StatRequest {
  string path = 1;
}

message StatResponse {
  FileMetadata metadata = 1;
}

message DirectoryEntry {
  string name = 1;
  string path = 2;
  bool is_dir = 3;
  uint64 file_id = 4;
}

message ListDirRequest {
  string path = 1;
}

message ListDirResponse {
  repeated DirectoryEntry entries = 1;
}

message ResolvePathRequest {
  string path = 1;
}

message ResolvePathResponse {
  FileMetadata metadata = 1;
}

message OpenRequest {
  string path = 1;
}

message OpenResponse {
  uint64 file_handle = 1;
  uint64 file_id = 2;
  uint64 size = 3;
  uint64 mtime_ns = 4;
  bytes content_hash = 5;
  uint32 block_size = 6;
}

message BlockRequest {
  uint64 file_handle = 1;
  uint64 start_offset = 2;
  uint32 block_count = 3;
}

message ReadBlocksRequest {
  repeated BlockRequest ranges = 1;
}

message BlockResponse {
  uint64 file_handle = 1;
  uint64 offset = 2;
  bytes data = 3;
  bytes block_hash = 4;
}

message PrefetchRange {
  uint64 file_id = 1;
  uint64 start_offset = 2;
  uint32 block_count = 3;
  PrefetchPriority priority = 4;
  uint64 deadline_unix_ms = 5;
}

message PrefetchRequest {
  repeated PrefetchRange ranges = 1;
  bool wait_for_residency = 2;
  PrefetchPriority wait_through_priority = 3;
}

message PrefetchResponse {
  repeated PrefetchRange accepted = 1;
  repeated PrefetchRange completed = 2;
}

message SubscribeRequest {}

message InvalidationEvent {
  InvalidationKind kind = 1;
  string path = 2;
  uint64 file_id = 3;
}

message CloseRequest {
  uint64 file_handle = 1;
}

message CloseResponse {}
